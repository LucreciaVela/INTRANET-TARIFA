  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.getElementById('error-display');
      d.style.display = 'block';
      d.textContent = '❌ Error JS:\n' + msg + '\nArchivo: ' + src + '\nLínea: ' + line + '\n\n' + (err ? err.stack : '');
    };
    window.onunhandledrejection = function(e) {
      var d = document.getElementById('error-display');
      d.style.display = 'block';
      d.textContent += '\n❌ Promise rechazada:\n' + e.reason;
    };
  </script>

    window.storage = {
      get: async function(key) {
        try { var v=localStorage.getItem("ersep_"+key); return v?{key:key,value:v}:null; }
        catch(e){ return null; }
      },
      set: async function(key,value) {
        try { localStorage.setItem("ersep_"+key, typeof value==="string"?value:JSON.stringify(value)); return {key:key,value:value}; }
        catch(e){ return null; }
      },
      delete: async function(key) {
        localStorage.removeItem("ersep_"+key); return {key:key,deleted:true};
      },
      list: async function(prefix) {
        var keys=[];
        for(var i=0;i<localStorage.length;i++){
          var k=localStorage.key(i);
          if(k&&k.startsWith("ersep_"+(prefix||""))) keys.push(k.replace("ersep_",""));
        }
        return {keys:keys};
      }
    };
